name: Build arm64-v8a APK

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
    branches: [ master, ci/build-time-experiment ]
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java version'
        required: true
        default: '17'
      java_distribution:
        description: 'Java distribution'
        required: true
        default: 'temurin'
      verbose:
        description: 'Run with verbose logging'
        required: false
        default: 'false'

env:
  KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
  ALIAS_NAME: ${{ secrets.ALIAS_NAME }}
  ALIAS_PASS: ${{ secrets.ALIAS_PASS }}
  CHAT_ID: ${{ secrets.CHAT_ID }}
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: ${{ github.event.inputs.java_distribution || 'temurin' }}
        java-version: ${{ github.event.inputs.java_version || '17' }}

    - name: Setup Flutter
      uses: subosito/flutter-action@v2.23.0
      with:
        channel: 'stable'
        cache: true

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
      with:
        target: aarch64-linux-android
        cache-shared-key: android-rhttp
        cache-workspaces: |
          plugins/rhttp/rhttp/rust -> ../../../../build/rhttp/build

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: false
        cache-cleanup: on-success

    - name: Flutter Doctor
      run: flutter doctor -v
      if: github.event.inputs.verbose == 'true'

    - name: Flutter Pub Get (rhttp)
      working-directory: plugins/rhttp/rhttp
      run: flutter pub get

    - name: Flutter Build Runner (rhttp)
      working-directory: plugins/rhttp/rhttp
      run: dart run build_runner build

    - name: Flutter Pub Get
      run: flutter pub get

    - name: Flutter Build Runner
      run: dart run build_runner build

    - name: Flutter Test (non-verbose)
      if: github.event.inputs.verbose != 'true'
      continue-on-error: true
      run: flutter test

    - name: Flutter Test (verbose)
      if: github.event.inputs.verbose == 'true'
      continue-on-error: true
      run: flutter test --verbose

    - name: Flutter Build arm64-v8a APK (non-verbose)
      if: github.event.inputs.verbose != 'true'
      run: flutter build apk --release --no-pub --split-per-abi --target-platform android-arm64 --dart-define=IS_GOOGLEPLAY=false --dart-define=BUILD_ABI=true

    - name: Flutter Build arm64-v8a APK (verbose)
      if: github.event.inputs.verbose == 'true'
      run: flutter build apk --release --no-pub --split-per-abi --target-platform android-arm64 --verbose --dart-define=IS_GOOGLEPLAY=false --dart-define=BUILD_ABI=true

    - name: Send arm64-v8a variant to me via Telegram
      if: env.CHAT_ID != '' && env.BOT_TOKEN != ''
      run: |
        OUTPUT="build/app/outputs/apk/release/app-arm64-v8a-release.apk"
        curl https://api.telegram.org/bot${BOT_TOKEN}/sendDocument -X POST -F chat_id="$CHAT_ID" -F caption="[arm64-v8a] $GITHUB_SHA" -F document="@$OUTPUT" > /dev/null

    - uses: actions/upload-artifact@v7
      name: Upload arm64-v8a APK
      with:
        name: app-arm64-v8a-release
        path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
        if-no-files-found: error
